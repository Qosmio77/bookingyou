<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BookingYou — 立即預約</title>
<style>
  :root { --navy:#1B3B6E; --teal:#4ECCC5; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    background:linear-gradient(160deg,#f4f7fc 0%,#e9eef8 100%);
    display:flex; align-items:center; justify-content:center; padding:24px; color:var(--navy);
  }
  .card {
    background:#fff; border-radius:28px; padding:40px 28px; max-width:360px; width:100%;
    text-align:center; box-shadow:0 12px 40px rgba(27,59,110,.14); border:1px solid #e3e9f4;
  }
  .logo { font-size:22px; font-weight:800; letter-spacing:4px; margin-bottom:20px; }
  .logo span { color:var(--teal); }
  .biz { font-size:19px; font-weight:700; margin:0 0 6px; min-height:24px; }
  .sub { font-size:14px; color:#6b7a90; margin:0 0 26px; }
  .spinner {
    width:34px; height:34px; margin:0 auto 26px; border-radius:50%;
    border:3px solid #dbe3f1; border-top-color:var(--teal); animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .btn {
    display:block; background:var(--navy); color:#fff; text-decoration:none;
    font-weight:700; font-size:16px; padding:15px; border-radius:14px; margin-bottom:12px;
  }
  .hint { font-size:13px; color:#8a97a8; margin:0; line-height:1.5; }
  .hint a { color:var(--navy); font-weight:600; }
  .soon { font-size:14px; color:#6b7a90; line-height:1.6; margin:0 0 8px; }
  .hidden { display:none; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">BOOKING<span>YOU</span></div>
    <div id="biz" class="biz">正在開啟…</div>
    <p class="sub" id="sub">線上預約 · 即時確認</p>
    <div class="spinner" id="spinner"></div>
    <a id="openBtn" class="btn hidden" href="#">用 App 開啟 / 下載</a>
    <p class="hint" id="hint"></p>
  </div>
<script>
(function () {
  var APPSTORE = 'https://apps.apple.com/app/id6782119326';
  var PLAYSTORE = 'https://play.google.com/store/apps/details?id=com.bookingyou.app';
  // Flip to true once the Android app is live on Google Play.
  var ANDROID_LIVE = false;
  var SUPA = 'https://gzwebxflrltxaglrukde.supabase.co';
  var ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6d2VieGZscmx0eGFnbHJ1a2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMjA2MDcsImV4cCI6MjA5Njc5NjYwN30.BJoQTqVDw3NAEW_LC0DxhWDgQDHOv-7Str6B6sHDVoU';

  var id = new URLSearchParams(location.search).get('id');
  var ua = navigator.userAgent || '';
  var isIOS = /iPhone|iPad|iPod/i.test(ua);
  var isAndroid = /Android/i.test(ua);

  var biz = document.getElementById('biz');
  var sub = document.getElementById('sub');
  var spinner = document.getElementById('spinner');
  var openBtn = document.getElementById('openBtn');
  var hint = document.getElementById('hint');

  if (!id) { location.replace(isAndroid && ANDROID_LIVE ? PLAYSTORE : APPSTORE); return; }

  // Fetch the business name for a friendlier page (anon read is public; optional).
  fetch(SUPA + '/rest/v1/businesses?id=eq.' + encodeURIComponent(id) + '&select=name', { headers: { apikey: ANON } })
    .then(function (r) { return r.json(); })
    .then(function (d) { if (d && d[0] && d[0].name) biz.textContent = d[0].name; })
    .catch(function () {});

  var deep = 'bookingapp://business/' + id;

  // Android, not yet on Google Play → show a "coming soon" state instead of a dead link.
  if (isAndroid && !ANDROID_LIVE) {
    spinner.classList.add('hidden');
    sub.textContent = '線上預約 · 即時確認';
    hint.innerHTML = '📱 Android 版即將推出，敬請期待！<br>iPhone 用戶可<a href="' + APPSTORE + '">前往 App Store 下載</a>。';
    return;
  }

  var store = isAndroid ? PLAYSTORE : APPSTORE;
  openBtn.href = deep;
  openBtn.classList.remove('hidden');
  hint.innerHTML = '未自動開啟?<a id="storeLink" href="' + store + '">按此前往' + (isAndroid ? ' Google Play' : ' App Store') + '</a>';

  // If the app opens, the page is backgrounded — cancel the store fallback.
  var appOpened = false;
  document.addEventListener('visibilitychange', function () { if (document.hidden) appOpened = true; });

  // Try to open the app, then fall back to the correct store if nothing handled the scheme.
  setTimeout(function () { window.location = deep; }, 120);
  setTimeout(function () { if (!appOpened) window.location = store; }, 1700);
})();
</script>
</body>
</html>
